name: Run tests

on: [ push, pull_request ]

jobs:
    php-tests:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ ubuntu-latest, windows-latest ]
                php: [ 8.0, 8.1, 8.2, 8.3, 8.4, 8.5 ]
                stability: [ prefer-lowest, prefer-stable ]

        name: P${{ matrix.php }} - ${{ matrix.stability }} - ${{ matrix.os }}

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php }}
                    extensions: mbstring
                    coverage: none

            -   name: Setup problem matchers
                run: |
                    echo "::add-matcher::${{ runner.tool_cache }}/php.json"
                    echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

            -   name: Require Pest 1 for PHP 8.0/8.1
                if: matrix.php == '8.0' || matrix.php == '8.1'
                shell: bash
                run: composer require "pestphp/pest:^1.20" --dev --no-update

            -   name: Require Pest 2 for PHP 8.2/8.3
                if: matrix.php == '8.2' || matrix.php == '8.3'
                shell: bash
                run: composer require "pestphp/pest:^2.0" --dev --no-update

            -   name: Require Pest 3 for PHP 8.4+
                if: matrix.php == '8.4' || matrix.php == '8.5'
                shell: bash
                run: composer require "pestphp/pest:^3.0" "illuminate/cache:^12.0" --dev --no-update

            -   name: Install dependencies
                run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction

            -   name: Install extra package
                if: matrix.php != '8.0'
                run: composer require openai-php/client

            -   name: Execute tests
                run: vendor/bin/pest
